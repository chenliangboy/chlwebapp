<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>浮动图片气泡墙</title>
  </head>
  <body>
    <main class="app-shell is-right-collapsed" aria-label="浮动图片气泡墙">
      <aside id="leftSidebar" class="sidebar-left" aria-label="主菜单">
        <header class="sidebar-brand">
          <button id="leftSidebarToggle" class="brand-button" type="button" aria-label="隐藏左侧菜单" title="隐藏左侧菜单">
            <img src="/images/chl.png" alt="CHL" draggable="false" />
          </button>
          <div class="brand-copy">
            <strong>CHL</strong>
            <span>Bubble Wall</span>
          </div>
        </header>
        <nav class="app-menu" aria-label="页面菜单">
          <button class="menu-item is-active" type="button" data-view="workspace" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="3" y="15" width="7" height="5" rx="1.5"></rect>
              <rect x="14" y="15" width="7" height="5" rx="1.5"></rect>
            </svg>
            <span>工作台</span>
          </button>
          <button class="menu-item" type="button" data-view="settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v3M12 18v3M4.6 7.5l2.6 1.5M16.8 15l2.6 1.5M4.6 16.5 7.2 15M16.8 9l2.6-1.5"></path>
              <circle cx="12" cy="12" r="4"></circle>
            </svg>
            <span>设置</span>
          </button>
        </nav>
      </aside>

      <button id="leftSidebarReveal" class="sidebar-reveal" type="button" aria-label="显示左侧菜单" title="显示左侧菜单">
        <img src="/images/chl.png" alt="" draggable="false" />
      </button>

      <section class="workspace-panel" aria-label="工作区域">
        <section id="workspaceView" class="view-panel is-active" aria-label="工作台">
          <div class="stage" aria-label="可拖拽的浮动图片气泡墙">
            <button id="layoutToggle" class="layout-toggle" type="button" aria-label="切换为网格布局" title="切换为网格布局" aria-pressed="false">
              <svg class="layout-icon layout-icon-grid" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="6" height="6" rx="1.5"></rect>
                <rect x="14" y="4" width="6" height="6" rx="1.5"></rect>
                <rect x="4" y="14" width="6" height="6" rx="1.5"></rect>
                <rect x="14" y="14" width="6" height="6" rx="1.5"></rect>
              </svg>
              <svg class="layout-icon layout-icon-free" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="7" cy="7" r="3"></circle>
                <circle cx="17" cy="9" r="2.5"></circle>
                <circle cx="11" cy="17" r="3.5"></circle>
              </svg>
            </button>
            <div id="bubbleLayer" class="bubble-layer"></div>
            <button id="searchToggle" class="search-toggle" type="button" aria-label="搜索气泡" title="搜索气泡 Ctrl+F" aria-expanded="false" aria-controls="searchPanel">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m16.5 16.5 4 4"></path>
              </svg>
            </button>
            <div id="searchPanel" class="search-panel" aria-hidden="true">
              <label class="sr-only" for="bubbleSearch">搜索气泡标题</label>
              <svg class="search-panel-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m16.5 16.5 4 4"></path>
              </svg>
              <input id="bubbleSearch" type="search" autocomplete="off" placeholder="输入标题实时搜索" />
            </div>
          </div>
        </section>

        <section id="settingsView" class="view-panel settings-view" aria-label="气泡设置">
          <header class="settings-header">
            <div>
              <p>设置</p>
              <h1>气泡列表</h1>
            </div>
            <button id="addBubbleButton" class="primary-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14"></path>
              </svg>
              <span>新增</span>
            </button>
          </header>
          <div id="bubbleEditor" class="bubble-editor" aria-hidden="true">
            <form id="bubbleForm" class="bubble-form">
              <input id="bubbleId" type="hidden" />
              <label>
                <span>标题</span>
                <input id="bubbleTitle" name="title" type="text" required maxlength="28" placeholder="例如：产品资料" />
              </label>
              <label>
                <span>图片地址</span>
                <input id="bubbleImage" name="image" type="text" placeholder="/images/example.png 或 https://..." />
              </label>
              <div class="form-grid">
                <label>
                  <span>主色</span>
                  <input id="bubbleColor" name="color" type="color" value="#ffc107" />
                </label>
                <label>
                  <span>浅色</span>
                  <input id="bubblePale" name="pale" type="color" value="#fff3cd" />
                </label>
                <label>
                  <span>类型</span>
                  <select id="bubbleType" name="type">
                    <option value="spark">spark</option>
                    <option value="sun">sun</option>
                    <option value="mountain">mountain</option>
                    <option value="flower">flower</option>
                    <option value="wave">wave</option>
                    <option value="note">note</option>
                    <option value="film">film</option>
                    <option value="star">star</option>
                    <option value="book">book</option>
                  </select>
                </label>
              </div>
              <div class="form-actions">
                <button class="secondary-button" id="cancelEditButton" type="button">取消</button>
                <button class="primary-button" type="submit">保存</button>
              </div>
            </form>
          </div>
          <div id="bubbleList" class="bubble-list" aria-label="所有气泡"></div>
        </section>
      </section>

      <aside id="rightPanel" class="side-panel" aria-label="功能区域">
        <div id="rightPanelResize" class="side-panel-resize" role="separator" aria-label="调整功能区域宽度" aria-orientation="vertical" tabindex="0"></div>
        <header class="side-panel-header">
          <div>
            <span>功能区域</span>
            <strong>详情</strong>
          </div>
          <button id="rightPanelToggle" class="icon-button" type="button" aria-label="隐藏功能区域" title="隐藏功能区域">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
        </header>
        <div id="detailPanel" class="detail-panel"></div>
      </aside>

      <button id="rightPanelReveal" class="right-reveal" type="button" aria-label="显示功能区域" title="显示功能区域">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </button>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
